# findings/2026-W29/netty-boringssl-native-lib.md.
mvnopts = -Djacoco.skip=true -Dmaven.javadoc.skip=true -Drat.skip=true -Dlicense.skip=true -Dcheckstyle.skip -Denforcer.skip=true -Dspotbugs.skip=true -Dfindbugs.skip=true -Ddependency-check.skip=true -Dmaven.test.failure.ignore=true -Dhawtjni.skip=true -Drevapi.skip=true -Djapicmp.skip=true -Dgpg.skip=true -DfailIfNoTests=false -fn -Dsurefire.security.manager=true -Pboringssl
