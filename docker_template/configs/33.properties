repo_url = https://github.com/netty/netty.git
commit_sha = 57bea3bea22717639ba200432c81b23154e4bbd9
module_dir = handler
java = /usr/lib/jvm/java-11-openjdk-amd64
# -Pboringssl: netty's default (non-aarch64 Linux) test dep is the DYNAMIC netty-tcnative, which
# needs the container's system OpenSSL 1.0.x (libssl.so.1.0.0) -- removed from modern Debian/Ubuntu
# repos, can't be apt-installed. -Pboringssl swaps in netty-tcnative-boringssl-static (self-contained,
# no system OpenSSL needed) -- the same artifact netty's own CI uses on non-x86_64-Linux-native runs.
# See findings/2026-W29/netty-boringssl-native-lib.md. Applies to both the initial build (entrypoint)
# and every measurement's real `mvn surefire:test` (SurefireOrchestrator re-resolves the pom per run).
mvnopts = -Djacoco.skip=true -Dmaven.javadoc.skip=true -Drat.skip=true -Dlicense.skip=true -Dcheckstyle.skip -Denforcer.skip=true -Dspotbugs.skip=true -Dfindbugs.skip=true -Ddependency-check.skip=true -Dmaven.test.failure.ignore=true -Dhawtjni.skip=true -Drevapi.skip=true -Djapicmp.skip=true -Dgpg.skip=true -DfailIfNoTests=false -fn -Dsurefire.security.manager=true -DforkCount=1 -DreuseForks=false -Pboringssl
