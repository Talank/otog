repo_url = https://github.com/apache/curator.git
commit_sha = 57cf5135aa7cf2e5e37f3147b3d702f06b15ccfc
module_dir = curator-framework
java = /usr/lib/jvm/java-11-openjdk-amd64
# TestWithCluster: 3-node in-process ZK quorum; election-port bind race -> ZooKeeper System.exit(14)
# (UNABLE_TO_BIND_QUORUM_PORT) kills the shared fork mid-suite. Probabilistic (~1 in 40 runs), not
# catchable by the trace-gate, no config fix exists (exit is hardcoded in ZK, port race in curator-test).
exclude = org.apache.curator.framework.imps.TestWatcherRemovalManager,org.apache.curator.framework.imps.TestWithCluster
mvnopts = -Djacoco.skip=true -Dmaven.javadoc.skip=true -Drat.skip=true -Dlicense.skip=true -Dcheckstyle.skip -Denforcer.skip=true -Dspotbugs.skip=true -Dfindbugs.skip=true -Ddependency-check.skip=true -Dmaven.test.failure.ignore=true -Dhawtjni.skip=true -Drevapi.skip=true -Djapicmp.skip=true -Dgpg.skip=true -DfailIfNoTests=false -fn -Dsurefire.security.manager=true -Ddevelocity.cache.local.directory=/tmp/develocity-cache
